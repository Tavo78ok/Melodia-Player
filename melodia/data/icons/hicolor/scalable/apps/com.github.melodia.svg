<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F08878"/>
      <stop offset="100%" stop-color="#C04030"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#333" stroke-width="1"/>
  <!-- Music note -->
  <g fill="url(#note)">
    <!-- Note head -->
    <ellipse cx="24" cy="44" rx="6" ry="4.5" transform="rotate(-15,24,44)"/>
    <!-- Note stem -->
    <rect x="29.5" y="18" width="3" height="27" rx="1.5"/>
    <!-- Note flag / beam top -->
    <path d="M32.5 18 Q48 22 44 34 Q40 30 32.5 30 Z"/>
  </g>
</svg>
